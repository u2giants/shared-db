name: DB Data Admin

on:
  pull_request:
    paths:
      - "apps/db-data-admin/**"
      - ".github/workflows/db-data-admin.yml"
  push:
    branches: [main]
    paths:
      - "apps/db-data-admin/**"
      - ".github/workflows/db-data-admin.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: db-data-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/db-data-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/db-data-admin/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
        env:
          VITE_BUILD_SHA: ${{ github.sha }}

  container:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/u2giants/db-data-admin
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: apps/db-data-admin
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BUILD_SHA=${{ github.sha }}
