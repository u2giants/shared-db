name: DB Data Admin

on:
  pull_request:
    paths:
      - "apps/db-data-admin/**"
      - ".github/workflows/db-data-admin.yml"
  push:
    branches: [main]
    paths:
      - "apps/db-data-admin/**"
      - ".github/workflows/db-data-admin.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: db-data-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/db-data-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/db-data-admin/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: VITE_BUILD_DATE="$(date -u +%Y-%m-%d)" npm run build
        env:
          VITE_BUILD_SHA: ${{ github.sha }}
      - run: npx playwright install --with-deps chromium
      - run: VITE_BUILD_DATE="$(date -u +%Y-%m-%d)" npm run test:browser
        env:
          VITE_BUILD_SHA: ${{ github.sha }}

  container:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Record build date
        id: build-date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/u2giants/db-data-admin
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: apps/db-data-admin
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BUILD_SHA=${{ github.sha }}
            VITE_BUILD_DATE=${{ steps.build-date.outputs.date }}

  deploy-development:
    if: github.event_name == 'push'
    needs: container
    runs-on: ubuntu-latest
    env:
      COOLIFY_URL: ${{ vars.COOLIFY_URL }}
      COOLIFY_APP_UUID: ${{ vars.COOLIFY_APP_UUID }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
    steps:
      - name: Point Coolify at the verified immutable image
        run: |
          image_tag="sha-${GITHUB_SHA::7}"
          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{\"docker_registry_image_tag\":\"${image_tag}\"}" \
            "${COOLIFY_URL}/api/v1/applications/${COOLIFY_APP_UUID}"

      - name: Deploy through Coolify
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false"
