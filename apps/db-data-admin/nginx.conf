server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /config.js {
    access_log off;
    default_type application/javascript;
    add_header Cache-Control "no-store";
    return 200 "window.__DB_DATA_ADMIN_CONFIG__ = { supabaseUrl: '${DB_DATA_ADMIN_SUPABASE_URL}', supabaseAnonKey: '${DB_DATA_ADMIN_SUPABASE_ANON_KEY}', authRedirectUrl: '${DB_DATA_ADMIN_AUTH_REDIRECT_URL}' };\n";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
